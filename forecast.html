<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="d-flex justify-content-center align-items-center vh-100">

        <div class="card bg-dark text-white shadow-lg" style="width:20rem;border-radius:15px;">

            <div class="card-body text-center p-4">


                <div class="input-group mb-4">

                    <input type="text" class="form-control" id="city" placeholder="Enter city">

                    <button class="btn btn-primary" onclick="gettemp()">
                        Display
                    </button>

                </div>


                <div class="py-3">

                    <p class="display-3 fw-bold mb-0" id="temp">
                        _ _°C
                    </p>

                    <p class="text-secondary small" id="forecast">
                    </p>

                </div>

                <div id="forecast5"></div>
            </div>

        </div>

    </div>

<script>

async function gettemp(){

    const cityInput = document.getElementById("city").value;


    const weatherUrl =
    `https://api.openweathermap.org/data/2.5/weather?q=${cityInput}&appid={APIKEY}&units=metric`;


    const forecastUrl =
    `https://api.openweathermap.org/data/2.5/forecast?q=${cityInput}&appid={APIKEY}&units=metric`;


    try{


        // current weather

        const response = await fetch(weatherUrl);


        if(!response.ok){
            throw new Error("City not found");
        }


        const data = await response.json();


        document.getElementById("temp").innerHTML =
        `${data.main.temp}°C`;


        document.getElementById("forecast").innerHTML =
        data.weather[0].description;



        // 5 day forecast

        const forecastResponse = await fetch(forecastUrl);

        const forecastData = await forecastResponse.json();


        let html = `
        <h5 class="mt-3">5 Day Forecast</h5>
        `;


        let days = {};


        forecastData.list.forEach(item=>{

            let date = item.dt_txt.split(" ")[0];


            if(!days[date]){

                days[date] = item;

            }

        });



        Object.values(days)
        .slice(0,5)
        .forEach(day=>{


            let date = new Date(day.dt_txt)
            .toDateString()
            .slice(0,3);


            html += `

            <div class="d-flex justify-content-between 
            bg-secondary rounded p-2 mb-2">

            <span>${date}</span>

            <span>
            ${day.main.temp}°C
            </span>

            <span>
            ${day.weather[0].description}
            </span>

            </div>

            `;


        });


        document.getElementById("forecast5")
        .innerHTML = html;



    }

    catch(error){


        document.getElementById("temp").innerHTML="Error";

        document.getElementById("forecast").innerHTML=
        error.message;

    }

}


</script>

</body>

</html>
